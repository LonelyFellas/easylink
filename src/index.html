<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="./assets/image/logo.ico"
      type="image/x-icon"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Link</title>
    <style>
      :root {
        --bg-color: #f5f5f5;
        --text-color: #333;
        color-scheme: light;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #2e303d;
          --text-color: #ffffff;
          color-scheme: dark;
        }
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        color: var(--text-color);
      }

      #root {
        width: 100%;
        height: 100%;
      }

      #initial-loading-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg-color);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s ease-out;
      }

      #initial-loading-overlay[data-hidden='true'] {
        opacity: 0;
        pointer-events: none;
      }

      .initial-loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .initial-loading-logo {
        width: 160px;
        height: auto;
        animation: initial-loading-pulse 1.4s ease-in-out infinite;
      }

      .initial-loading-spinner {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 3px solid rgba(127, 127, 127, 0.25);
        border-top-color: #f5811f;
        animation: initial-loading-spin 0.8s linear infinite;
      }

      @keyframes initial-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes initial-loading-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .initial-loading-logo,
        .initial-loading-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loading-overlay">
      <div class="initial-loading-content">
        <img
          class="initial-loading-logo"
          src="./assets/image/logo_text.png"
          alt="Easy Link"
        />
        <div class="initial-loading-spinner"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
