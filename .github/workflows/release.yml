name: Release Build

on:
  # ! 为了避免重复发布版本，应当通过独特 git tag 触发。
  # ! 不再使用 workflow_dispatch 触发。
  # workflow_dispatch:
  push:
    # -rc tag 时预览发布, 跳过 telegram 通知、跳过 winget 提交、跳过 latest.json 文件更新
    tags:
      - 'v*.*.*'
permissions: write-all
env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0
  # 发布目标仓库（公开仓库）。源码在 private 仓库，构建产物发到这里。
  PUBLISH_OWNER: LonelyFellas
  PUBLISH_REPO: easylink
concurrency:
  # only allow per workflow per commit (and not pr) to run at a time
  group: '${{ github.workflow }} - ${{ github.head_ref || github.ref }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check_tag_version:
    name: Check Release Tag and package.json Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if tag is from main branch
        run: |
          TAG_REF="${GITHUB_REF##*/}"
          echo "Checking if tag $TAG_REF is from main branch..."

          TAG_COMMIT=$(git rev-list -n 1 $TAG_REF)
          MAIN_COMMITS=$(git rev-list origin/main)

          if echo "$MAIN_COMMITS" | grep -q "$TAG_COMMIT"; then
            echo "✅ Tag $TAG_REF is from main branch"
          else
            echo "❌ Tag $TAG_REF is not from main branch"
            echo "This release workflow only accepts tags from main branch."
            exit 1
          fi

      - name: Check tag and package.json version
        run: |
          TAG_REF="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
          echo "Current tag: $TAG_REF"

          # 预览版 tag（vX.Y.Z-rc.N 等）只比对基础版本号，剥掉 -rc/-beta 等后缀
          BASE_TAG="${TAG_REF%%-*}"
          echo "Base tag (suffix stripped): $BASE_TAG"

          PKG_VERSION=$(jq -r .version package.json)
          echo "package.json version: $PKG_VERSION"

          EXPECTED_TAG="v$PKG_VERSION"

          if [[ "$BASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "❌ Version mismatch:"
            echo "   Git tag (base): $BASE_TAG"
            echo "   package.json  : $EXPECTED_TAG"
            exit 1
          fi

          echo "✅ Tag and package.json version are consistent."

  create_release:
    name: Create Draft Release on Public Repo
    needs: [check_tag_version]
    runs-on: ubuntu-latest
    steps:
      # 跨仓库发布：tag 只存在于本(private)仓库，公开仓库没有对应 commit。
      # 必须先在公开仓库用它自己的默认分支作为 target_commitish 预建 draft release，
      # 否则后续构建步骤创建 release 会因 target_commitish 无效而失败。
      - name: Create draft release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLISH_REPO_FULL: ${{ env.PUBLISH_OWNER }}/${{ env.PUBLISH_REPO }}
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ contains(github.ref_name, '-rc') }}
        run: |
          if gh release view "$TAG" --repo "$PUBLISH_REPO_FULL" >/dev/null 2>&1; then
            echo "Release $TAG already exists on $PUBLISH_REPO_FULL, skip creation."
            exit 0
          fi

          DEFAULT_BRANCH=$(gh repo view "$PUBLISH_REPO_FULL" --json defaultBranchRef --jq '.defaultBranchRef.name')
          echo "Public repo default branch: $DEFAULT_BRANCH"

          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --repo "$PUBLISH_REPO_FULL" \
            --target "$DEFAULT_BRANCH" \
            --title "Easy Link $TAG" \
            --notes "Draft release, will be updated later." \
            --draft \
            $PRERELEASE_FLAG

          echo "Created draft release $TAG on $PUBLISH_REPO_FULL."

  update_tag:
    name: Update tag
    runs-on: ubuntu-latest
    needs: [release, release-for-linux-arm, release-for-fixed-webview2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch UPDATE logs
        id: fetch_update_logs
        run: bash ./scripts/extract_update_logs.sh
        shell: bash

      - name: Set Env
        run: |
          echo "BUILDTIME=$(TZ=Asia/Shanghai date)" >> $GITHUB_ENV
          TAG_REF="${GITHUB_REF##*/}"
          echo "TAG_NAME=$TAG_REF" >> $GITHUB_ENV
          VERSION=$(echo "$TAG_REF" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=${{ github.server_url }}/${{ env.PUBLISH_OWNER }}/${{ env.PUBLISH_REPO }}/releases/download/$TAG_REF" >> $GITHUB_ENV
        shell: bash

      - run: |
          if [ -z "$UPDATE_LOGS" ]; then
            echo "No update logs found, using default message"
            UPDATE_LOGS="More new features are now supported. Check for detailed changelog soon."
          else
            echo "Using found update logs"
          fi

          cat > release.txt << EOF
          $UPDATE_LOGS

          ## 下载

          请在下方 **Assets** 中选择对应平台的安装包：
          - Windows: \`*_x64-setup.exe\` / \`*_arm64-setup.exe\`
          - macOS: \`*_aarch64.dmg\` (Apple Silicon) / \`*_x64.dmg\` (Intel)
          - Linux: \`*.deb\` / \`*.rpm\` / \`*.AppImage\`

          Created at ${{ env.BUILDTIME }}.
          EOF

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PRERELEASE: ${{ contains(github.ref_name, '-rc') }}
          PUBLISH_REPO_FULL: ${{ env.PUBLISH_OWNER }}/${{ env.PUBLISH_REPO }}
        run: |
          matches=$(gh api repos/${PUBLISH_REPO_FULL}/releases --paginate --jq '.[] | select(.tag_name == env.TAG_NAME) | [.id, .draft, (.assets | length), .html_url] | @tsv')
          release_count=$(grep -c . <<< "$matches" || true)

          if [ "$release_count" -eq 0 ]; then
            echo "::error::No release found for $TAG_NAME."
            exit 1
          fi

          if [ "$release_count" -gt 1 ]; then
            printf '%s\n' "$matches"
            echo "::error::Multiple releases found for $TAG_NAME. Merge or delete duplicate releases before rerunning."
            exit 1
          fi

          IFS=$'\t' read -r release_id _ asset_count release_url <<< "$matches"
          echo "Publishing release $release_id ($release_url) with $asset_count assets."

          gh api --method PATCH repos/${PUBLISH_REPO_FULL}/releases/"$release_id" \
            -f name="Easy Link $TAG_NAME" \
            -F body=@release.txt \
            -F draft=false \
            -F prerelease="$PRERELEASE" \
            --silent

  release:
    name: Release Build
    needs: [check_tag_version, create_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.91.0'
          targets: ${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: 'v1-rust'
          key: 'rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install x86 OpenSSL (macOS only)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Add Rust Target
        run: |
          # Ensure cross target is installed for the pinned toolchain; fallback without explicit toolchain if needed
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed
          echo "Rust target ${{ matrix.target }} installed."

      - name: Tauri build
        # 上游 5.24 修改了 latest.json 的生成逻辑，且依赖 tauri-plugin-update 2.10.0 暂未发布，故锁定在 0.5.23 版本
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          owner: ${{ env.PUBLISH_OWNER }}
          repo: ${{ env.PUBLISH_REPO }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Easy Link ${{ github.ref_name }}'
          releaseBody: 'Draft release, will be updated later.'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          tauriScript: pnpm
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true

      - name: Attest Windows bundles
        if: matrix.os == 'windows-latest'
        # 私有仓库（个人账户）无法生成 build provenance，失败不阻断发布
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Attest macOS bundles
        if: matrix.os == 'macos-latest'
        # 私有仓库（个人账户）无法生成 build provenance，失败不阻断发布
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Attest Linux bundles
        if: matrix.os == 'ubuntu-22.04'
        # 私有仓库（个人账户）无法生成 build provenance，失败不阻断发布
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  release-for-linux-arm:
    name: Release Build for Linux ARM
    needs: [check_tag_version, create_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            arch: armhf
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.91.0'
          targets: ${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: 'v1-rust'
          key: 'rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: 'Setup for linux'
        run: |-
          sudo ls -lR /etc/apt/

          cat > /tmp/sources.list << EOF
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-security main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-backports main multiverse universe restricted

          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main multiverse universe restricted
          EOF

          sudo mv /etc/apt/sources.list /etc/apt/sources.list.default
          sudo mv /tmp/sources.list /etc/apt/sources.list

          sudo dpkg --add-architecture ${{ matrix.arch }}
          sudo apt update

          sudo apt install -y \
            libxslt1.1:${{ matrix.arch }} \
            libwebkit2gtk-4.1-dev:${{ matrix.arch }} \
            libayatana-appindicator3-dev:${{ matrix.arch }} \
            libssl-dev:${{ matrix.arch }} \
            patchelf:${{ matrix.arch }} \
            librsvg2-dev:${{ matrix.arch }}

      - name: 'Install aarch64 tools'
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: 'Install armv7 tools'
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo apt install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf

      - name: Add Rust Target
        run: |
          # Ensure cross target is installed for the pinned toolchain; fallback without explicit toolchain if needed
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed
          echo "Rust target ${{ matrix.target }} installed."

      - name: Build for Linux
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu/
          elif [ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]; then
            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/arm-linux-gnueabihf/
          fi
          pnpm build --target ${{ matrix.target }}
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get Version
        run: |
          sudo apt-get update
          sudo apt-get install jq
          echo "VERSION=$(cat package.json | jq '.version' | tr -d '"')" >> $GITHUB_ENV
          echo "BUILDTIME=$(TZ=Asia/Shanghai date)" >> $GITHUB_ENV

      - name: Attest Linux bundles
        # 私有仓库（个人账户）无法生成 build provenance，失败不阻断发布
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          repository: ${{ env.PUBLISH_OWNER }}/${{ env.PUBLISH_REPO }}
          tag_name: v${{env.VERSION}}
          name: 'Easy Link v${{env.VERSION}}'
          body: 'See release notes for detailed changelog.'
          token: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  release-for-fixed-webview2:
    name: Release Build for Fixed WebView2
    needs: [check_tag_version, create_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.91.0'
          targets: ${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: 'v1-rust'
          key: 'rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Download WebView2 Runtime
        run: |
          invoke-webrequest -uri https://github.com/westinyang/WebView2RuntimeArchive/releases/download/133.0.3065.92/Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab -outfile Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab
          Expand .\Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab -F:* ./src-tauri
          Remove-Item .\src-tauri\tauri.windows.conf.json
          Rename-Item .\src-tauri\webview2.${{ matrix.arch }}.json tauri.windows.conf.json

      - name: Add Rust Target
        run: |
          # Ensure cross target is installed for the pinned toolchain; fallback without explicit toolchain if needed
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed
          echo "Rust target ${{ matrix.target }} installed."

      - name: Tauri build
        id: build
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          owner: ${{ env.PUBLISH_OWNER }}
          repo: ${{ env.PUBLISH_REPO }}
          tauriScript: pnpm
          args: --target ${{ matrix.target }}

      - name: Rename
        run: |
          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*-setup.exe"
          foreach ($file in $files) {
            $newName = $file.Name -replace "-setup\.exe$", "_fixed_webview2-setup.exe"
            Rename-Item $file.FullName $newName
          }

          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*.nsis.zip"
          foreach ($file in $files) {
            $newName = $file.Name -replace "-setup\.nsis\.zip$", "_fixed_webview2-setup.nsis.zip"
            Rename-Item $file.FullName $newName
          }

          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*-setup.exe.sig"
          foreach ($file in $files) {
            $newName = $file.Name -replace "-setup\.exe\.sig$", "_fixed_webview2-setup.exe.sig"
            Rename-Item $file.FullName $newName
          }

      - name: Attest Windows bundles
        # 私有仓库（个人账户）无法生成 build provenance，失败不阻断发布
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          repository: ${{ env.PUBLISH_OWNER }}/${{ env.PUBLISH_REPO }}
          tag_name: v${{steps.build.outputs.appVersion}}
          name: 'Easy Link v${{steps.build.outputs.appVersion}}'
          body: 'See release notes for detailed changelog.'
          token: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Portable Bundle
        run: pnpm portable-fixed-webview2 ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLISH_OWNER: ${{ env.PUBLISH_OWNER }}
          PUBLISH_REPO: ${{ env.PUBLISH_REPO }}

  release-update:
    if: ${{ !contains(github.ref_name, '-rc') }}
    name: Release Update
    runs-on: ubuntu-latest
    needs: [update_tag]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install
        run: pnpm i

      - name: Release updater file
        run: pnpm updater
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLISH_OWNER: ${{ env.PUBLISH_OWNER }}
          PUBLISH_REPO: ${{ env.PUBLISH_REPO }}

  release-update-for-fixed-webview2:
    if: ${{ !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    needs: [update_tag]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install
        run: pnpm i

      - name: Release updater file
        run: pnpm updater-fixed-webview2
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLISH_OWNER: ${{ env.PUBLISH_OWNER }}
          PUBLISH_REPO: ${{ env.PUBLISH_REPO }}

